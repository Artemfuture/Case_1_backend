services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checks_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/checks_db
      APP_NAME: Document Checks API
      APP_VERSION: 1.0.0
      DEBUG: "false"
      MAX_FILE_SIZE_MB: 20
      UPLOADS_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"